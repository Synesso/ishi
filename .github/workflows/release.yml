name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ishi-${{ matrix.target }}.tar.gz ishi
      - uses: actions/upload-artifact@v4
        with:
          name: ishi-${{ matrix.target }}
          path: ishi-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create universal binary
        run: |
          mkdir -p staging
          for dir in artifacts/ishi-*; do
            tar xzf "$dir"/*.tar.gz -C staging
            target=$(basename "$dir" | sed 's/^ishi-//')
            mv staging/ishi "staging/ishi-${target}"
          done
          lipo -create staging/ishi-aarch64-apple-darwin staging/ishi-x86_64-apple-darwin \
            -output staging/ishi
          tar czf ishi-universal-apple-darwin.tar.gz -C staging ishi
      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 ishi-universal-apple-darwin.tar.gz | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/ishi-aarch64-apple-darwin/*.tar.gz \
            artifacts/ishi-x86_64-apple-darwin/*.tar.gz \
            ishi-universal-apple-darwin.tar.gz
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/synesso/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/ishi.rb <<'FORMULA'
          class Ishi < Formula
            desc "TUI for managing Linear issues with Amp integration"
            homepage "https://github.com/synesso/ishi"
            license "MIT"

            def install
              bin.install "ishi"
            end
          end
          FORMULA
          sed -i '' 's/^          //' tap/Formula/ishi.rb
          # Insert url, sha256 and version after the homepage line
          sed -i '' "/homepage/a\\
            url \"https://github.com/synesso/ishi/releases/download/${GITHUB_REF_NAME}/ishi-universal-apple-darwin.tar.gz\"\\
            sha256 \"${{ steps.sha.outputs.sha256 }}\"\\
            version \"${version}\"" tap/Formula/ishi.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ishi.rb
          if git diff --cached --quiet; then
            echo "No formula changes"
          else
            git commit -m "ishi ${GITHUB_REF_NAME}"
            git push
          fi
